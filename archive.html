<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARD Archive</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

.logo{
    width:220px;
    margin-top:20px;
}

.top-button{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:black;
    text-decoration:none;
    padding:10px 15px;
    font-weight:bold;
}

.archive-container{
    margin-top:20px;
}

#archiveImage{
    max-width:90%;
    max-height:70vh;
    border:1px solid #222;
}

.image-number{
    margin-top:15px;
    color:#888;
}

.pagination{
    position:fixed;
    right:20px;
    bottom:20px;
}

.pagination button{
    background:#111;
    color:white;
    border:1px solid #444;
    padding:12px 18px;
    cursor:pointer;
    margin-left:5px;
}

.pagination button:hover{
    background:#222;
}

.label{
    position:fixed;
    left:20px;
    bottom:20px;
    color:#a020f0;
    font-size:14px;
    letter-spacing:2px;
}

</style>
</head>
<body>

<a href="category2.html" class="top-button">
OTHER CATEGORY
</a>

<img src="ard.png" alt="ARD Logo" class="logo">

<div class="archive-container">

<img id="archiveImage" src="1.png">

<div class="image-number" id="imageCounter">
FILE 1 / 21
</div>

</div>

<div class="label">
PURPLE CLASSIFICATION // ARCHIVE NODE 13
</div>

<div class="pagination">
<button onclick="previousImage()">◀ PREV</button>
<button onclick="nextImage()">NEXT ▶</button>
</div>

<script>

const totalImages = 11;
let currentImage = 1;

function updateImage(){

    document.getElementById("archiveImage").src =
    currentImage + ".png";

    document.getElementById("imageCounter").innerText =
    "FILE " + currentImage + " / " + totalImages;

}

function nextImage(){

    if(currentImage < totalImages){

        currentImage++;
        updateImage();

    }

}

function previousImage(){

    if(currentImage > 1){

        currentImage--;
        updateImage();

    }

}

document.addEventListener("keydown", function(e){

    if(e.key === "ArrowRight"){
        nextImage();
    }

    if(e.key === "ArrowLeft"){
        previousImage();
    }

});

</script>

</body>
</html>
